<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中医智能问诊系统</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>中医智能问诊系统</h1>
            <p>基于人工智能的中医健康咨询助手</p>
        </header>

        <div class="status-bar">
            <div class="session-info">
                <span><span class="status-dot"></span> 在线</span>
                <span id="sessionId">会话ID: --</span>
                <span id="phaseInfo">阶段: 欢迎</span>
                <span id="visitTypeInfo">类型: --</span>
            </div>
            <div style="display: flex; gap: 8px; align-items: center;">
                <button class="btn btn-secondary" onclick="handleNewSessionBtn()">
                    <span>🆕</span> 新会话
                </button>
            </div>
        </div>

        <div class="chat-container">
            <!-- 就诊人选择区域 -->
            <div class="patient-select-area" id="patientSelectArea">
                <div class="patient-select-header">
                    <span class="patient-select-title">选择就诊人</span>
                    <button class="patient-select-btn" id="patientSelectBtn" onclick="togglePatientSelect()">
                        <span id="patientSelectText">请选择</span> ▼
                    </button>
                </div>
                <div class="patient-list" id="patientList">
                    <!-- 就诊人列表将动态生成 -->
                </div>
                <div class="patient-selected-info" id="patientSelectedInfo" style="display: none;">
                    <div class="patient-name" id="selectedPatientName"></div>
                    <div class="patient-detail" id="selectedPatientDetail"></div>
                    <button class="patient-change-btn" onclick="changePatient()">更换</button>
                </div>
            </div>

            <div class="messages" id="messages">
                <div class="empty-state" id="emptyState">
                    <div class="empty-state-icon">🩺</div>
                    <p>欢迎使用中医智能问诊系统</p>
                    <span>请先选择就诊人，然后开始咨询</span>
                </div>
            </div>

            <!-- 图片上传区域 -->
            <div class="image-upload-area" id="imageUploadArea">
                <div class="image-upload-card" id="tongueUploadCard" onclick="triggerImageUpload('tongue')">
                    <input type="file" id="tongueInput" accept="image/*" onchange="handleImageUpload(this, 'tongue')">
                    <div class="image-upload-icon">👅</div>
                    <div class="image-upload-title">舌照</div>
                    <div class="image-upload-desc" id="tongueDesc">点击上传</div>
                </div>

                <div class="image-upload-card" id="faceUploadCard" onclick="triggerImageUpload('face')">
                    <input type="file" id="faceInput" accept="image/*" onchange="handleImageUpload(this, 'face')">
                    <div class="image-upload-icon">😊</div>
                    <div class="image-upload-title">面照</div>
                    <div class="image-upload-desc" id="faceDesc">点击上传</div>
                </div>

                <div class="image-upload-card" id="reportUploadCard" onclick="triggerImageUpload('report')">
                    <input type="file" id="reportInput" accept="image/*" onchange="handleImageUpload(this, 'report')">
                    <div class="image-upload-icon">📋</div>
                    <div class="image-upload-title">检查报告</div>
                    <div class="image-upload-desc" id="reportDesc">点击上传</div>
                </div>

                <div class="image-upload-hint" id="imageUploadHint">
                    请按顺序上传舌照、面照（如有检查报告也可上传）
                </div>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <div class="input-container">
                        <textarea 
                            id="messageInput" 
                            placeholder="请输入您的问题... (Shift+Enter换行，Enter发送)"
                            rows="1"
                        ></textarea>
                    </div>
                    <div class="input-actions">
                        <button class="action-btn voice-btn" id="voiceBtn" title="语音输入">
                            🎤
                        </button>
                        <span class="recording-time" id="recordingTime">
                            <span class="recording-dot"></span>
                            <span id="recordingDuration">0:00</span>
                        </span>
                        <button class="action-btn send-btn" id="sendBtn" onclick="sendMessage()">
                            ➤
                        </button>
                    </div>
                </div>
                <div class="quick-actions">
                    <button class="quick-btn" onclick="sendQuickMessage('我最近感觉疲劳乏力')">疲劳乏力</button>
                    <button class="quick-btn" onclick="sendQuickMessage('最近睡眠不好')">睡眠不好</button>
                    <button class="quick-btn" onclick="sendQuickMessage('经常头痛')">经常头痛</button>
                    <button class="quick-btn" onclick="sendQuickMessage('痤疮')">痤疮</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
